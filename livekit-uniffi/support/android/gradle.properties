org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

###############################################################
# Gradle properties for publishing to Maven Central.
###############################################################

GROUP=io.livekit
VERSION_NAME=0.0.1

POM_NAME=LiveKit UniFFI for Android
POM_DESCRIPTION=UniFFI bindings for LiveKit Android SDK
POM_ARTIFACT_ID=livekit-uniffi-android
POM_PACKAGING=aar

POM_URL=https://github.com/livekit/rust-sdks/tree/main/livekit-uniffi
POM_SCM_URL=https://github.com/livekit/rust-sdks/tree/main/livekit-uniffi
POM_SCM_CONNECTION=scm:git:git://github.com/livekit/rust-sdks.git
POM_SCM_DEV_CONNECTION=scm:git:ssh://git@github.com/livekit/rust-sdks.git

POM_LICENCE_NAME=The Apache Software License, Version 2.0
POM_LICENCE_URL=http://www.apache.org/licenses/LICENSE-2.0.txt
POM_LICENCE_DIST=repo

POM_DEVELOPER_ID=livekit
POM_DEVELOPER_NAME=LiveKit

RELEASE_REPOSITORY_URL=https://ossrh-staging-api.central.sonatype.com/service/local/
SNAPSHOT_REPOSITORY_URL=https://central.sonatype.com/repository/maven-snapshots/

# Variables required to allow build.gradle to parse for publishing.
# WARNING: Do not edit this and potentially commit to repo.
# Instead, override in ~/.gradle/gradle.properties
nexusUsername=
nexusPassword=
signing.keyId=
signing.password=
signing.secretKeyRingFile=

STAGING_PROFILE_ID=

RELEASE_SIGNING_ENABLED=true
