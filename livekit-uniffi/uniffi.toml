[bindings.swift]
ffi_module_name = "RustLiveKitUniFFI"

[bindings.kotlin]
android = true
package_name = "io.livekit.uniffi"
cdylib_name = "livekit_uniffi" # the name of the so file to be loaded

[bindings.dart]
# Dart package name; must match the published pub package so the Native Assets
# asset id resolves to `package:livekit_uniffi/uniffi:livekit_uniffi`.
package_name = "livekit_uniffi"
cdylib_name = "livekit_uniffi"