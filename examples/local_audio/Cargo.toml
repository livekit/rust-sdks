[package]
name = "local_audio"
version = "0.1.0"
edition.workspace = true
publish = false
default-run = "local_audio"

[[bin]]
name = "local_audio"
path = "src/main.rs"

[[bin]]
name = "subscriber"
path = "src/subscriber.rs"

[[bin]]
name = "latency_loopback"
path = "src/latency_loopback.rs"

[dependencies]
tokio = { workspace = true, features = ["full"] }
env_logger = { workspace = true }
livekit = { workspace = true, features = ["rustls-tls-native-roots"] }
livekit-api = { workspace = true, features = ["rustls-tls-native-roots"] }
libwebrtc = { workspace = true }
log = { workspace = true }
cpal = "0.15"
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
futures-util = { workspace = true }
