[package]
name = "encoded_video_ingest"
version = "0.1.0"
edition.workspace = true
publish = false

[[bin]]
name = "sender"
path = "src/sender.rs"

[[bin]]
name = "receiver"
path = "src/receiver.rs"

[[bin]]
name = "simple_sender"
path = "src/simple_sender.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
eframe = { workspace = true, features = ["default_fonts", "wgpu"] }
egui = { workspace = true }
egui-wgpu = { workspace = true }
env_logger = { workspace = true }
futures = { workspace = true }
libwebrtc = { workspace = true, features = ["encoded-video"] }
livekit = { workspace = true, features = ["encoded-video", "rustls-tls-native-roots"] }
livekit-api = { workspace = true, features = ["rustls-tls-native-roots"] }
livekit-encoded-video-ingest = { workspace = true }
log = { workspace = true }
parking_lot = { workspace = true }
tokio = { workspace = true, features = ["full"] }
