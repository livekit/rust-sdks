[package]
name = "wgpu_room"
version = "0.1.1"
edition.workspace = true
publish = false

[features]
default = []
tracing = ["console-subscriber", "tokio/tracing"]

[dependencies]
tokio = { workspace = true, features = ["full", "parking_lot"] }
livekit = { workspace = true, features = ["rustls-tls-native-roots"]}
webrtc-sys = { workspace = true }
futures = { workspace = true }
parking_lot = { workspace = true, features = ["deadlock_detection"] }
eframe = { workspace = true, features = ["default_fonts", "wgpu", "persistence"] }
egui = { workspace = true }
egui-wgpu = { workspace = true }
image = { workspace = true }
wgpu = { workspace = true }
winit = { workspace = true, features = [ "android-native-activity" ] }
serde = { workspace = true, features = ["derive"] }
log = { workspace = true }
env_logger = { workspace = true }
console-subscriber = { workspace = true, features = ["parking_lot"], optional = true }
