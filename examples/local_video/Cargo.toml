[package]
name = "local_video"
version = "0.2.0"
edition.workspace = true
publish = false

[features]
desktop = []

[[bin]]
name = "publisher"
path = "src/publisher.rs"
required-features = ["desktop"]

[[bin]]
name = "subscriber"
path = "src/subscriber.rs"
required-features = ["desktop"]

[[bin]]
name = "list_devices"
path = "src/list_devices.rs"
required-features = ["desktop"]

[[bin]]
name = "clock"
path = "src/clock.rs"
required-features = ["desktop"]

[dependencies]
tokio = { workspace = true, features = ["full", "parking_lot"] }
tokio-stream = { workspace = true }
livekit = { workspace = true, features = ["rustls-tls-native-roots"] }
livekit-api = { workspace = true }
livekit-capture = { workspace = true }
futures = { workspace = true }
clap = { workspace = true, features = ["derive"] }
log = { workspace = true }
env_logger = { workspace = true }
eframe = { workspace = true, features = ["default_fonts", "wgpu", "persistence"] }
egui = { workspace = true }
egui-wgpu = { workspace = true }
wgpu = { workspace = true }
winit = { workspace = true, features = [ "android-native-activity" ] }
parking_lot = { workspace = true, features = ["deadlock_detection"] }
anyhow = { workspace = true }
chrono = "0.4"
bytemuck = { version = "1.16", features = ["derive"] }

[target.'cfg(target_os = "macos")'.dependencies]
livekit-capture = { workspace = true, features = ["avfoundation"] }
metal = "0.32"

[target.'cfg(target_os = "linux")'.dependencies]
livekit-capture = { workspace = true, features = ["libargus", "v4l"] }

[build-dependencies]
cc = { workspace = true }
