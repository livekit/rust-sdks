[package]
name = "local_video"
version = "0.2.0"
edition.workspace = true
publish = false

[features]
desktop = []

[[bin]]
name = "publisher"
path = "src/publisher.rs"
required-features = ["desktop"]

[[bin]]
name = "subscriber"
path = "src/subscriber.rs"
required-features = ["desktop"]

[[bin]]
name = "list_devices"
path = "src/list_devices.rs"
required-features = ["desktop"]

[dependencies]
tokio = { workspace = true, features = ["full", "parking_lot"] }
livekit = { workspace = true, features = ["rustls-tls-native-roots"] }
webrtc-sys = { workspace = true }
libwebrtc = { workspace = true }
livekit-api = { workspace = true }
yuv-sys = { workspace = true, features = ["jpeg"] }
futures = { workspace = true }
clap = { workspace = true, features = ["derive"] }
log = { workspace = true }
env_logger = { workspace = true }
eframe = { workspace = true, features = ["default_fonts", "wgpu", "persistence"] }
egui = { workspace = true }
egui-wgpu = { workspace = true }
image = { workspace = true }
wgpu = { workspace = true }
winit = { workspace = true, features = [ "android-native-activity" ] }
parking_lot = { workspace = true, features = ["deadlock_detection"] }
anyhow = { workspace = true }
chrono = "0.4"
bytemuck = { version = "1.16", features = ["derive"] }

nokhwa = { git = "https://github.com/l1npengtul/nokhwa", rev = "4923ecab7cf26f9dba83867a15a9d8662d021296", default-features = false, features = ["output-threaded"] }

[target.'cfg(target_os = "macos")'.dependencies]
nokhwa = { git = "https://github.com/l1npengtul/nokhwa", rev = "4923ecab7cf26f9dba83867a15a9d8662d021296", default-features = false, features = ["input-avfoundation"] }
objc2 = { version = "0.6.0", features = ["relax-sign-encoding"] }

[target.'cfg(target_os = "linux")'.dependencies]
nokhwa = { git = "https://github.com/l1npengtul/nokhwa", rev = "4923ecab7cf26f9dba83867a15a9d8662d021296", default-features = false, features = ["input-v4l"] }

[target.'cfg(target_os = "windows")'.dependencies]
nokhwa = { git = "https://github.com/l1npengtul/nokhwa", rev = "4923ecab7cf26f9dba83867a15a9d8662d021296", default-features = false, features = ["input-msmf"] }
