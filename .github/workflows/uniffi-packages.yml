name: UniFFI packages

# Orchestrates per-language wrapper-package publishing for the livekit-uniffi
# crate. Resolves the source tag once, delegates to per-language reusable
# workflows (uniffi-swift.yml today; uniffi-kotlin.yml / uniffi-python.yml
# would slot in as additional jobs), then publishes the GitHub release once
# every leg succeeds. Called from release.yml when a release PR merges;
# workflow_dispatch is the manual/recovery path.

on:
  workflow_call:
    inputs:
      dry_run:
        description: "Build artifacts but skip release upload/PR."
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g., livekit-uniffi/v0.0.7). Overrides resolution from the crate version."
        required: false
        type: string
      dry_run:
        description: "Build artifacts but skip release upload/PR."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.get-tag.outputs.tag_name }}
      version: ${{ steps.get-tag.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: get-tag
        uses: ./.github/actions/resolve-release-tag
        with:
          package: livekit-uniffi
          manifest-path: livekit-uniffi/Cargo.toml
          tag-name: ${{ inputs.tag_name }}

  swift:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag_name != ''
    uses: ./.github/workflows/uniffi-swift.yml
    with:
      version: ${{ needs.resolve-tag.outputs.version }}
      tag_name: ${{ needs.resolve-tag.outputs.tag_name }}
      dry_run: ${{ inputs.dry_run || false }}
    secrets:
      UNIFFI_XCFRAMEWORK_PAT: ${{ secrets.UNIFFI_XCFRAMEWORK_PAT }}

  android:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag_name != ''
    uses: ./.github/workflows/uniffi-android.yml
    with:
      version: ${{ needs.resolve-tag.outputs.version }}
      tag_name: ${{ needs.resolve-tag.outputs.tag_name }}
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit

  # Raw cdylibs for the Dart package's build-hook download (build-<triple>.zip).
  cdylib:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag_name != ''
    # The reusable workflow uploads to this repo's release via github.token; a
    # called workflow can't elevate the caller's token, so grant write here (the
    # top-level default is read). Swift uses a PAT and Android uses Maven, so
    # neither needs this.
    permissions:
      contents: write
    uses: ./.github/workflows/uniffi-cdylib.yml
    with:
      version: ${{ needs.resolve-tag.outputs.version }}
      tag_name: ${{ needs.resolve-tag.outputs.tag_name }}
      dry_run: ${{ inputs.dry_run || false }}

  # The knope draft release stays draft until every leg has succeeded, so a
  # failed leg leaves it as a retry marker (re-run via workflow_dispatch).
  # Publishing also makes the cdylib assets publicly downloadable — draft
  # assets aren't reachable at releases/download URLs.
  finalize:
    name: Publish GH release
    needs: [resolve-tag, swift, android, cdylib]
    if: success() && inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.resolve-tag.outputs.tag_name }}" --repo "${{ github.repository }}" --draft=false
