name: Builds

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # sccache caches rustc invocations across runs (key: source hash + flags).
  # We do NOT wrap CC/CXX globally because the matrix includes cross-compile
  # targets (iOS, Android, Windows-arm64) where wrapping is fragile. If the
  # cxx_build step in `webrtc-sys` becomes the bottleneck again, set
  # `CC_<host_triple>=sccache cc` per-job for host targets only.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            #extraargs: --exclude livekit-api --exclude livekit-ffi # waiting for v0.17 of ring
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-ios
          - os: macos-latest
            target: aarch64-apple-ios-sim
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-linux-android
            ndk_arch: aarch64-unknown-linux-musl
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            ndk_arch: arm-unknown-linux-musleabihf
          - os: ubuntu-latest
            target: x86_64-linux-android
            ndk_arch: x86_64-unknown-linux-musl

    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true

      - name: Install Protoc
        uses: arduino/setup-protoc@a8b67ba40b37d35169e222f3bb352603327985b6 # v2.1.0
        with:
          version: "25.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install linux dependencies
        if: ${{ matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'}}
        # TODO: pin to a verified SHA once dependabot picks it up.
        uses: awalsh128/cache-apt-pkgs-action@v1.5.3
        with:
          # libasound2-dev is needed for local_audio example
          # libdrm, libgbm, libxfixes, libxdamage, libxrandr, libxcomposite and libglib are needed for DesktopCapturer
          # lld is needed on aarch64 because GNU ld cannot link libwebrtc.a for some reason
          packages: >-
            lld
            libasound2-dev
            libssl-dev
            libx11-dev
            libgl1-mesa-dev
            libxext-dev
            libdrm-dev
            libgbm-dev
            libxfixes-dev
            libxdamage-dev
            libxrandr-dev
            libxcomposite-dev
            libglib2.0-dev
          version: 1

      - name: Install VA-API/NVIDIA drivers for linux x64 build
        if: ${{ matrix.os == 'ubuntu-latest'}}
        # TODO: pin to a verified SHA once dependabot picks it up.
        uses: awalsh128/cache-apt-pkgs-action@v1.5.3
        with:
          packages: >-
            libva-dev
            libdrm-dev
            libnvidia-compute-570
            libnvidia-decode-570
            nvidia-cuda-dev
          version: 1

      - name: Install Rust toolchain.
        run: |
          rustup target add ${{ matrix.target }}

      - name: Setup sccache
        # TODO: pin to a verified SHA once dependabot picks it up.
        uses: mozilla-actions/sccache-action@v0.0.7

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Setup libwebrtc (cached, keyed by WEBRTC_TAG)
        uses: ./.github/actions/setup-libwebrtc
        with:
          rust-target: ${{ matrix.target }}

      - name: Build (Cargo)
        if: ${{ !contains(matrix.target, 'android') }}
        run: |
          cargo build --release --workspace -p livekit --target ${{ matrix.target }}

      - name: Build (Android)
        if: ${{ contains(matrix.target, 'android') }}
        run: |
          cargo install cargo-ndk
          # FIXME: wgpu_room does not link on aarch64
          cargo ndk --target ${{ matrix.target }} build --release -p livekit --workspace -vv
