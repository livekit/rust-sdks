name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: debug
  # sccache stores its cache in GitHub Actions' cache backend; both rustc and
  # C/C++ invocations route through it. See the "Setup sccache" step below.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Platform supports is limited for tests
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
            e2e-testing: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            e2e-testing: true

    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: true

      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update nightly
          rustup target add ${{ matrix.target }} --toolchain nightly

      - name: Install Protoc
        uses: arduino/setup-protoc@a8b67ba40b37d35169e222f3bb352603327985b6 # v2.1.0
        with:
          version: "25.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # sccache wraps both rustc and the C/C++ compilers used by `cxx_build`
      # in `webrtc-sys`. The Mozilla action installs the binary; env vars
      # at the workflow level (RUSTC_WRAPPER / SCCACHE_GHA_ENABLED) plus the
      # CC/CXX overrides below route compilation through the cache.
      - name: Setup sccache
        # TODO: pin to a verified SHA once dependabot picks it up.
        uses: mozilla-actions/sccache-action@v0.0.7

      # All three matrix targets in tests.yml are host targets (no
      # cross-compile), so wrapping CC/CXX is safe. Skip on Windows: MSVC `cl`
      # is sccache-supported but the env-var dance is fragile here and the
      # default `cc` crate flow needs more setup. Rust caching alone covers
      # most of the win on Windows.
      - name: Wrap C/C++ with sccache (Unix hosts)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          echo "CC=sccache cc"  >> "$GITHUB_ENV"
          echo "CXX=sccache c++" >> "$GITHUB_ENV"

      # Use Swatinem/rust-cache for parity with builds.yml. It caches the cargo
      # registry/git plus the meaningful subset of `target/`, with cache keys
      # that avoid stale-cache problems. The libwebrtc binary itself is cached
      # separately by setup-libwebrtc below so it survives Cargo.lock churn.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Setup libwebrtc (cached, keyed by WEBRTC_TAG)
        uses: ./.github/actions/setup-libwebrtc
        with:
          rust-target: ${{ matrix.target }}

      - name: Install linux dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # TODO: pin to a verified SHA once dependabot picks it up.
        uses: awalsh128/cache-apt-pkgs-action@v1.5.3
        with:
          # libasound2-dev is needed for local_audio example
          # libdrm, libgbm, libxfixes, libxdamage, libxrandr, libxcomposite and libglib are needed for DesktopCapturer
          packages: >-
            libasound2-dev
            libssl-dev
            libx11-dev
            libgl1-mesa-dev
            libxext-dev
            libva-dev
            libdrm-dev
            libnvidia-decode-570
            libnvidia-compute-570
            nvidia-cuda-dev
            libgbm-dev
            libxfixes-dev
            libxdamage-dev
            libxrandr-dev
            libxcomposite-dev
            libglib2.0-dev
          version: 1

      - name: Install LiveKit server
        if: ${{ matrix.e2e-testing }}
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            curl -sSL https://get.livekit.io | bash
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install livekit
          fi

      - name: Run LiveKit server
        if: ${{ matrix.e2e-testing }}
        env:
          # TODO: once data tracks is enabled by default in a subsequent SFU release, remove this.
          LIVEKIT_CONFIG: "enable_data_tracks: true"
        run: livekit-server --dev &

      # Tests run in dev profile to keep CI compile time reasonable. The e2e
      # path is timing-sensitive (ICE handshake, reconnect windows) but the
      # timeouts in those tests are real-clock seconds and have plenty of
      # headroom — dev's slower runtime doesn't push past them in practice.
      # Bump to --release here only if dev-profile e2e tests prove flaky.
      - name: Test (no E2E)
        if: ${{ !matrix.e2e-testing }}
        env:
          RUST_LOG: info
        run: cargo +nightly test --verbose --target ${{ matrix.target }} -- --nocapture

      - name: Test (with E2E)
        if: ${{ matrix.e2e-testing }}
        env:
          RUST_LOG: info
        run: cargo +nightly test --verbose --target ${{ matrix.target }} --features __lk-e2e-test -- --nocapture --test-threads=1
