name: UniFFI Swift package

# Builds livekit-uniffi as a Swift xcframework and publishes it to the
# livekit-uniffi-xcframework hosting repo (draft release + PR).
#
# Reusable workflow — called from uniffi-packages.yml after the source draft
# release has been resolved. Not triggered directly.

on:
  workflow_call:
    inputs:
      version:
        description: Hosting-repo tag (e.g., 0.0.7)
        required: true
        type: string
      tag_name:
        description: Source release tag (e.g., livekit-uniffi/v0.0.7) — surfaced in PR/release bodies for traceability
        required: true
        type: string
      dry_run:
        description: Build artifacts but skip release upload / PR
        required: false
        type: boolean
        default: false
    secrets:
      UNIFFI_XCFRAMEWORK_PAT:
        required: true

env:
  CARGO_TERM_COLOR: always
  HOSTING_REPO: livekit/livekit-uniffi-xcframework
  # SPM_NAME must match the value in livekit-uniffi/Makefile.toml [env].
  SPM_NAME: LiveKitUniFFI
  OUTPUT_DIR: livekit-uniffi/packages/swift/LiveKitUniFFI

jobs:
  build-and-publish:
    name: Build & publish Swift xcframework
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Apple Rust targets (tier 1/2)
        run: |
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios \
            aarch64-apple-ios-macabi \
            x86_64-apple-ios-macabi \
            aarch64-apple-darwin \
            x86_64-apple-darwin

      # tvOS + visionOS are still tier 3 (no prebuilt std), so cargo-swift
      # builds them via `cargo +nightly -Zbuild-std`. Toolchain + rust-src
      # need to exist ahead of time.
      - name: Install nightly + rust-src (tvOS/visionOS tier-3 targets)
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src

      - uses: cargo-bins/cargo-binstall@4852a15cf01e4f33958ce547326406fe78f27c38 # v1.19.0
      - run: cargo binstall cargo-make --no-confirm

      - name: Build Swift package
        working-directory: livekit-uniffi
        env:
          SPM_VERSION: ${{ inputs.version }}
          SPM_HOSTING_REPO: ${{ env.HOSTING_REPO }}
        run: cargo make --profile release swift-package

      - name: Publish to hosting repo
        if: ${{ !inputs.dry_run }}
        uses: livekit/publish-xcframework-action@200ee4984ef1b68068c0b3c4e87e798988730c90 # main @ fix: abort on missing source files (#3)
        with:
          xcframework-zip: ${{ env.OUTPUT_DIR }}/Rust${{ env.SPM_NAME }}.xcframework.zip
          version: ${{ inputs.version }}
          hosting-repo: ${{ env.HOSTING_REPO }}
          files: |
            ${{ env.OUTPUT_DIR }}/Package.swift:Package.swift
            ${{ env.OUTPUT_DIR }}/Package@swift-6.2.swift:Package@swift-6.2.swift
            ${{ env.OUTPUT_DIR }}/${{ env.SPM_NAME }}.podspec:${{ env.SPM_NAME }}.podspec
            ${{ env.OUTPUT_DIR }}/LICENSE:LICENSE
            ${{ env.OUTPUT_DIR }}/Sources/${{ env.SPM_NAME }}/livekit_uniffi.swift:Sources/${{ env.SPM_NAME }}/livekit_uniffi.swift
          token: ${{ secrets.UNIFFI_XCFRAMEWORK_PAT }}
          pr-body: |
            Source tag: `${{ inputs.tag_name }}`
          release-body: |
            Source tag: `${{ inputs.tag_name }}`
