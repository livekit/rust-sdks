name: Release

permissions:
  id-token: write # Required for OIDC
  pull-requests: write
  contents: write
  actions: write

on:
  push:
    branches:
      - main

jobs:
  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'livekit' }}
    permissions:
      contents: write
    outputs:
      ffi_tag: ${{ steps.ffi.outputs.ffi_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install VA-API/NVIDIA drivers and other dependencies for build
        run: |
          sudo apt update -y
          sudo apt install \
            libnvidia-compute-570 \
            libnvidia-decode-570 \
            nvidia-cuda-dev \
            libasound2-dev \
            libssl-dev \
            libx11-dev \
            libgl1-mesa-dev \
            libxext-dev \
            libva-dev \
            libdrm-dev \
            libgbm-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxrandr-dev \
            libxcomposite-dev \
            libglib2.0-dev -y

      - name: Run release-plz
        uses: release-plz/action@v0.5
        id: release-plz
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
      - name: Extract ffi tag
        id: ffi
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -e
          ffi_tag=$(echo "$RELEASES" | jq -r '.[].tag' | grep 'rust-sdks/livekit-ffi@' || true)
          echo "ffi_tag=$ffi_tag"
          echo "ffi_tag=$ffi_tag" >> $GITHUB_OUTPUT

  call-ffi:
    name: Call FFI Builds
    if: ${{ needs.release-plz-release.outputs.ffi_tag != '' }}
    uses: ./.github/workflows/ffi-builds.yml
    needs: release-plz-release
    with:
      tag: ${{ needs.release-plz-release.outputs.ffi_tag }}

  call-node-ffi:
    name: Call node FFI Builds
    if: ${{ needs.release-plz-release.outputs.ffi_tag != '' }}
    uses: ./.github/workflows/node-builds.yml
    needs: release-plz-release
    with:
      tag: ${{ needs.release-plz-release.outputs.ffi_tag }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install VA-API/NVIDIA drivers and other dependencies for build
        run: |
          sudo apt update -y
          sudo apt install \
            libnvidia-compute-570 \
            libnvidia-decode-570 \
            nvidia-cuda-dev \
            libasound2-dev \
            libssl-dev \
            libx11-dev \
            libgl1-mesa-dev \
            libxext-dev \
            libva-dev \
            libdrm-dev \
            libgbm-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxrandr-dev \
            libxcomposite-dev \
            libglib2.0-dev -y
      - name: Run release-plz
        uses: release-plz/action@v0.5
        id: release-plz
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Sync node package.json versions to livekit-ffi
        env:
          PR: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail

          HEAD_BRANCH=$(echo "$PR" | jq -r '.head_branch // empty')
          if [ -z "$HEAD_BRANCH" ]; then
            echo "No release PR, skipping"
            exit 0
          fi

          git fetch origin "$HEAD_BRANCH"
          git checkout "$HEAD_BRANCH"

          # Read version from Cargo.toml on the PR branch
          FFI_VERSION=$(grep '^version = ' livekit-ffi/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          CURRENT_VERSION=$(jq -r '.version' livekit-ffi-node-bindings/package.json)

          if [ "$FFI_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Versions already in sync ($FFI_VERSION)"
            exit 0
          fi

          echo "Updating node packages: $CURRENT_VERSION -> $FFI_VERSION"

          for pkg in livekit-ffi-node-bindings/package.json livekit-ffi-node-bindings/npm/*/package.json; do
            jq --arg v "$FFI_VERSION" '.version = $v' "$pkg" > tmp.json && mv tmp.json "$pkg"
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add livekit-ffi-node-bindings/package.json livekit-ffi-node-bindings/npm/*/package.json
          git commit -m "sync node package.json versions to $FFI_VERSION"
          git push origin "$HEAD_BRANCH"
