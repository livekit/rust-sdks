name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build artifacts but skip publishing/releasing."
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write

jobs:
  # Single gate for "a release was actually cut": the Knope release PR merged,
  # or this is a manual dispatch. Every other job `needs:` this one, so the
  # condition lives in exactly one place and skip-cascade handles the rest.
  release-gate:
    name: Release gate
    if: (github.head_ref == 'knope/release' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice title=Release gate::Release cut or manual dispatch."

  publish-crates:
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: false
          rustflags: ""

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # v1.20.0

      - name: Install cargo-release
        run: cargo binstall cargo-release@1.1.2 --no-confirm

      - name: Publish to crates.io
        run: cargo release publish --workspace --no-confirm --no-verify ${{ inputs.dry_run != true && '--execute' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

  call-node-ffi:
    name: Node FFI Builds
    needs: release-gate
    uses: ./.github/workflows/node-builds.yml
    with:
      dry_run: ${{ inputs.dry_run || false }}

  call-ffi:
    name: FFI Builds
    needs: release-gate
    uses: ./.github/workflows/ffi-builds.yml
    with:
      dry_run: ${{ inputs.dry_run || false }}

  call-uniffi:
    name: UniFFI Packages
    needs: release-gate
    uses: ./.github/workflows/uniffi-packages.yml
    with:
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
