name: Test API

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  failover:
    runs-on: ubuntu-latest
    services:
      mock-server:
        image: livekit/test-server:latest
        ports:
          - 9999:9999
          - 10000:10000
          - 10001:10001
          - 10002:10002
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: false
          rustflags: ""

      - name: Install Protoc
        uses: arduino/setup-protoc@a8b67ba40b37d35169e222f3bb352603327985b6 # v2.1.0
        with:
          version: "25.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for mock server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9999/settings/regions >/dev/null && exit 0
            sleep 1
          done
          echo "mock server did not become ready" && exit 1

      - name: Run API tests
        run: cargo test -p livekit-api --lib services::api_test -- --nocapture

      - name: Run signal tests
        run: cargo test -p livekit-api --features signal-client-tokio --lib signal_client::signal_test -- --nocapture
