name: Setup libwebrtc
description: |
  Pre-downloads the prebuilt libwebrtc archive to a cache-friendly location and
  exports `LK_CUSTOM_WEBRTC` so `webrtc-sys` skips its in-build download. The
  cache is keyed by `WEBRTC_TAG` (extracted from `webrtc-sys/build/src/lib.rs`)
  so it survives Cargo.lock churn — only invalidates when libwebrtc actually
  bumps. Saves ~150–300 MB of download per run on a cache hit.

inputs:
  rust-target:
    description: |
      Cargo target triple (e.g. `aarch64-apple-darwin`). Used to pick the
      matching libwebrtc archive variant and to namespace the cache key.
    required: true

outputs:
  webrtc-dir:
    description: Absolute path the action set as `LK_CUSTOM_WEBRTC`.
    value: ${{ steps.compute.outputs.webrtc_dir }}
  webrtc-tag:
    description: WEBRTC_TAG value extracted from the build script.
    value: ${{ steps.compute.outputs.webrtc_tag }}

runs:
  using: composite
  steps:
    - name: Compute libwebrtc triple + cache key
      id: compute
      shell: bash
      run: |
        set -euo pipefail
        # Extract the pinned WEBRTC_TAG from the build script. This is the
        # single source of truth — keep CI in sync with the code.
        webrtc_tag=$(grep -E '^pub const WEBRTC_TAG: &str' \
          "$GITHUB_WORKSPACE/webrtc-sys/build/src/lib.rs" \
          | sed -E 's/.*"(.*)".*/\1/')
        if [[ -z "$webrtc_tag" ]]; then
          echo "::error::failed to parse WEBRTC_TAG from webrtc-sys/build/src/lib.rs"
          exit 1
        fi

        # Map the cargo target triple to the libwebrtc release archive name.
        # Format: {os}-{arch}-release, see webrtc_triple() in
        # webrtc-sys/build/src/lib.rs.
        case "${{ inputs.rust-target }}" in
          x86_64-pc-windows-msvc)        triple="win-x64-release" ;;
          aarch64-pc-windows-msvc)       triple="win-arm64-release" ;;
          x86_64-apple-darwin)           triple="mac-x64-release" ;;
          aarch64-apple-darwin)          triple="mac-arm64-release" ;;
          aarch64-apple-ios)             triple="ios-device-arm64-release" ;;
          aarch64-apple-ios-sim)         triple="ios-simulator-arm64-release" ;;
          x86_64-unknown-linux-gnu)      triple="linux-x64-release" ;;
          aarch64-unknown-linux-gnu)     triple="linux-arm64-release" ;;
          aarch64-linux-android)         triple="android-arm64-release" ;;
          armv7-linux-androideabi)       triple="android-arm-release" ;;
          x86_64-linux-android)          triple="android-x64-release" ;;
          *)
            echo "::error::no libwebrtc mapping for target ${{ inputs.rust-target }}"
            exit 1
            ;;
        esac

        cache_root="$HOME/.cache/livekit-webrtc"
        webrtc_dir="$cache_root/$webrtc_tag/$triple"

        echo "webrtc_tag=$webrtc_tag"        >> "$GITHUB_OUTPUT"
        echo "triple=$triple"                >> "$GITHUB_OUTPUT"
        echo "cache_root=$cache_root"        >> "$GITHUB_OUTPUT"
        echo "webrtc_dir=$webrtc_dir"        >> "$GITHUB_OUTPUT"
        echo "cache_key=libwebrtc-$triple-$webrtc_tag" >> "$GITHUB_OUTPUT"

    - name: Restore libwebrtc cache
      id: cache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ${{ steps.compute.outputs.cache_root }}
        key: ${{ steps.compute.outputs.cache_key }}

    - name: Download + extract libwebrtc on cache miss
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        triple="${{ steps.compute.outputs.triple }}"
        tag="${{ steps.compute.outputs.webrtc_tag }}"
        webrtc_dir="${{ steps.compute.outputs.webrtc_dir }}"
        url="https://github.com/livekit/rust-sdks/releases/download/$tag/webrtc-$triple.zip"
        tmp="$RUNNER_TEMP/webrtc-$triple.zip"

        mkdir -p "$(dirname "$webrtc_dir")"
        echo "downloading $url"
        curl --fail --silent --show-error --location --retry 3 --output "$tmp" "$url"

        # The archive ships `{triple}/...`, so extracting at the parent dir
        # produces the path we advertise via LK_CUSTOM_WEBRTC.
        unzip -q "$tmp" -d "$(dirname "$webrtc_dir")"
        rm -f "$tmp"

    - name: Export LK_CUSTOM_WEBRTC
      shell: bash
      run: |
        echo "LK_CUSTOM_WEBRTC=${{ steps.compute.outputs.webrtc_dir }}" >> "$GITHUB_ENV"
