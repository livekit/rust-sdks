[package]
name = "livekit-capture"
version = "0.1.0"
description = "Camera capture sources for the LiveKit Rust SDK"
edition.workspace = true
repository.workspace = true
license.workspace = true
publish = false

[features]
default = ["uvc"]
# UVC / USB webcam capture via `nokhwa`. Always produces I420 frames
# (with libyuv-backed YUYV/MJPEG conversion).
uvc = ["dep:nokhwa", "dep:yuv-sys", "dep:image"]
# Raspberry Pi CSI camera capture via libcamera. Produces DMABUF-backed
# native frames that the V4L2 hardware encoder can import zero-copy.
libcamera = ["dep:libcamera"]

[dependencies]
anyhow = { workspace = true }
log = { workspace = true }
thiserror = { workspace = true }
libwebrtc = { workspace = true }

# uvc feature
nokhwa = { git = "https://github.com/l1npengtul/nokhwa", rev = "4923ecab7cf26f9dba83867a15a9d8662d021296", default-features = false, features = ["output-threaded"], optional = true }
yuv-sys = { workspace = true, features = ["jpeg"], optional = true }
image = { workspace = true, optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
nokhwa = { git = "https://github.com/l1npengtul/nokhwa", rev = "4923ecab7cf26f9dba83867a15a9d8662d021296", default-features = false, features = ["input-avfoundation"], optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
nokhwa = { git = "https://github.com/l1npengtul/nokhwa", rev = "4923ecab7cf26f9dba83867a15a9d8662d021296", default-features = false, features = ["input-v4l"], optional = true }
libcamera = { version = "0.7", optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
nokhwa = { git = "https://github.com/l1npengtul/nokhwa", rev = "4923ecab7cf26f9dba83867a15a9d8662d021296", default-features = false, features = ["input-msmf"], optional = true }
