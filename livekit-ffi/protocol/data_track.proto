syntax = "proto2";

package livekit.proto;

import "handle.proto";

option csharp_namespace = "LiveKit.Proto";

// MARK: - Common

// Information about a published data track.
message DataTrackInfo {
  // Name of the track assigned by the publisher.
  required string name = 1;
  // SFU-assigned track identifier.
  required string sid = 2;
  // Whether or not frames sent on the track use end-to-end encryption.
  required bool uses_e2ee = 3;
}

// A frame published on a data track.
message DataTrackFrame {
  required bytes payload = 1;
  optional uint64 user_timestamp = 2;
}

enum DataTrackErrorCode {
  DATA_TRACK_ERROR_CODE_UNKNOWN = 0;
  DATA_TRACK_ERROR_CODE_INVALID_HANDLE = 1;
  DATA_TRACK_ERROR_CODE_DUPLICATE_TRACK_NAME = 2;
  DATA_TRACK_ERROR_CODE_TRACK_UNPUBLISHED = 3;
  DATA_TRACK_ERROR_CODE_BUFFER_FULL = 4;
  DATA_TRACK_ERROR_CODE_SUBSCRIPTION_CLOSED = 5;
  DATA_TRACK_ERROR_CODE_CANCELLED = 6;
  DATA_TRACK_ERROR_CODE_PROTOCOL_ERROR = 7;
  DATA_TRACK_ERROR_CODE_INTERNAL = 8;
}

message DataTrackError {
  required DataTrackErrorCode code = 1;
  required string message = 2;
}

enum PublishDataTrackErrorCode {
  PUBLISH_DATA_TRACK_ERROR_CODE_UNKNOWN = 0;
  PUBLISH_DATA_TRACK_ERROR_CODE_INVALID_HANDLE = 1;
  PUBLISH_DATA_TRACK_ERROR_CODE_DUPLICATE_NAME = 2;
  PUBLISH_DATA_TRACK_ERROR_CODE_TIMEOUT = 3;
  PUBLISH_DATA_TRACK_ERROR_CODE_DISCONNECTED = 4;
  PUBLISH_DATA_TRACK_ERROR_CODE_NOT_ALLOWED = 5;
  PUBLISH_DATA_TRACK_ERROR_CODE_INVALID_NAME = 6;
  PUBLISH_DATA_TRACK_ERROR_CODE_LIMIT_REACHED = 7;
  PUBLISH_DATA_TRACK_ERROR_CODE_PROTOCOL_ERROR = 8;
  PUBLISH_DATA_TRACK_ERROR_CODE_INTERNAL = 9;
}

message PublishDataTrackError {
  required PublishDataTrackErrorCode code = 1;
  required string message = 2;
}

enum LocalDataTrackTryPushErrorCode {
  LOCAL_DATA_TRACK_TRY_PUSH_ERROR_CODE_UNKNOWN = 0;
  LOCAL_DATA_TRACK_TRY_PUSH_ERROR_CODE_INVALID_HANDLE = 1;
  LOCAL_DATA_TRACK_TRY_PUSH_ERROR_CODE_TRACK_UNPUBLISHED = 2;
  LOCAL_DATA_TRACK_TRY_PUSH_ERROR_CODE_QUEUE_FULL = 3;
  LOCAL_DATA_TRACK_TRY_PUSH_ERROR_CODE_INTERNAL = 4;
}

message LocalDataTrackTryPushError {
  required LocalDataTrackTryPushErrorCode code = 1;
  required string message = 2;
}

enum SubscribeDataTrackErrorCode {
  SUBSCRIBE_DATA_TRACK_ERROR_CODE_UNKNOWN = 0;
  SUBSCRIBE_DATA_TRACK_ERROR_CODE_INVALID_HANDLE = 1;
  SUBSCRIBE_DATA_TRACK_ERROR_CODE_UNPUBLISHED = 2;
  SUBSCRIBE_DATA_TRACK_ERROR_CODE_TIMEOUT = 3;
  SUBSCRIBE_DATA_TRACK_ERROR_CODE_DISCONNECTED = 4;
  SUBSCRIBE_DATA_TRACK_ERROR_CODE_PROTOCOL_ERROR = 5;
  SUBSCRIBE_DATA_TRACK_ERROR_CODE_INTERNAL = 6;
}

message SubscribeDataTrackError {
  required SubscribeDataTrackErrorCode code = 1;
  required string message = 2;
}

// MARK: - Local

// Options for publishing a data track.
message DataTrackOptions {
  // Track name used to identify the track to other participants.
  //
  // Must not be empty and must be unique per publisher.
  //
  required string name = 1;
}

// Publish a data track
message PublishDataTrackRequest {
  required uint64 local_participant_handle = 1;
  required DataTrackOptions options = 2;
  optional uint64 request_async_id = 3;
}
message PublishDataTrackResponse {
  required uint64 async_id = 1;
}
message PublishDataTrackCallback {
  required uint64 async_id = 1;
  oneof result {
    OwnedLocalDataTrack track = 2;
    PublishDataTrackError error = 3;
  }
}

message OwnedLocalDataTrack {
  required FfiOwnedHandle handle = 1;
  required DataTrackInfo info = 2;
}

// Try pushing a frame to subscribers of the track.
message LocalDataTrackTryPushRequest {
  required uint64 track_handle = 1;
  required DataTrackFrame frame = 2;
}
message LocalDataTrackTryPushResponse {
  optional LocalDataTrackTryPushError error = 2;
}

// Checks if the track is still published.
message LocalDataTrackIsPublishedRequest {
  required uint64 track_handle = 1;
}
message LocalDataTrackIsPublishedResponse {
  required bool is_published = 1;
}

// Unpublishes the track.
message LocalDataTrackUnpublishRequest {
  required uint64 track_handle = 1;
}
message LocalDataTrackUnpublishResponse {}

// MARK: - Remote

message OwnedRemoteDataTrack {
  required FfiOwnedHandle handle = 1;
  required DataTrackInfo info = 2;
  // Identity of the remote participant who published the track.
  required string publisher_identity = 3;
}

// Handle to an active data track subscription.
//
// Dropping the handle will unsubscribe from the track.
//
message OwnedDataTrackStream {
  required FfiOwnedHandle handle = 1;
}

// Reserved for future subscription options.
message DataTrackSubscribeOptions {
  // Maximum number of frames to buffer internally.
  optional uint32 buffer_size = 1;
}

// Checks if the track is still published.
message RemoteDataTrackIsPublishedRequest {
  required uint64 track_handle = 1;
}
message RemoteDataTrackIsPublishedResponse {
  required bool is_published = 1;
}

// Track-level options that configure how the incoming-frame pipeline reassembles packets for a remote data track.
message RemoteDataTrackPipelineOptions {
  // Maximum number of partial frames the depacketizer will track concurrently for this track.
  //
  // Zero is not a valid value; if a value of zero is provided, it will be clamped to one.
  //
  optional uint32 max_partial_frames = 1;
}

message RemoteDataTrackSetPipelineOptionsRequest {
  required uint64 track_handle = 1;
  required RemoteDataTrackPipelineOptions options = 2;
}
message RemoteDataTrackSetPipelineOptionsResponse {}

// Subscribe to a data track.
message SubscribeDataTrackRequest {
  required uint64 track_handle = 1;
  required DataTrackSubscribeOptions options = 2;
}
message SubscribeDataTrackResponse {
  required OwnedDataTrackStream stream = 1;
}

// Signal readiness to handle the next frame.
//
// This allows the client to put backpressure on the internal receive buffer.
// Sending this request will cause the next frame to be sent via `DataTrackStreamFrameReceived`
// once one is available.
//
message DataTrackStreamReadRequest {
  required uint64 stream_handle = 1;
}
message DataTrackStreamReadResponse {
  // The end-of-stream event if the stream has already ended.
  optional DataTrackStreamEOS eos_event = 1;
}

// Event emitted on an active stream.
message DataTrackStreamEvent {
  required uint64 stream_handle = 1;
  oneof detail {
    DataTrackStreamFrameReceived frame_received = 2;
    DataTrackStreamEOS eos = 3;
  }
}

// A frame was received.
message DataTrackStreamFrameReceived {
  required DataTrackFrame frame = 1;
}

// Stream has ended.
message DataTrackStreamEOS {
  // Present if stream ended before any frames were emitted due to subscription establishment failing.
  // Absent if the stream ended normally (i.e., due to the track being unpublished).
  optional SubscribeDataTrackError error = 1;
}

// MARK: - Schemas

// Encoding used to interpret a data track schema definition.
enum DataTrackSchemaEncoding {
  DATA_TRACK_SCHEMA_ENCODING_PROTOBUF = 0;
  DATA_TRACK_SCHEMA_ENCODING_FLATBUFFER = 1;
  DATA_TRACK_SCHEMA_ENCODING_ROS1_MSG = 2;
  DATA_TRACK_SCHEMA_ENCODING_ROS2_MSG = 3;
  DATA_TRACK_SCHEMA_ENCODING_ROS2_IDL = 4;
  DATA_TRACK_SCHEMA_ENCODING_OMG_IDL = 5;
  DATA_TRACK_SCHEMA_ENCODING_JSON_SCHEMA = 6;
  DATA_TRACK_SCHEMA_ENCODING_OTHER = 7;
}

// Uniquely identifies a data track schema.
message DataTrackSchemaId {
  // Name component of the schema identifier.
  required string name = 1;
  // Encoding of the schema definition.
  required DataTrackSchemaEncoding encoding = 2;
}

// Define (store) a schema definition for the local participant.
message DefineSchemaRequest {
  required uint64 local_participant_handle = 1;
  required DataTrackSchemaId schema_id = 2;
  required string definition = 3;
  optional uint64 request_async_id = 4;
}
message DefineSchemaResponse {
  required uint64 async_id = 1;
}
message DefineSchemaCallback {
  required uint64 async_id = 1;
  // Present if the schema could not be defined.
  optional string error = 2;
}

// Retrieve a schema definition previously stored by a participant.
message GetSchemaRequest {
  required uint64 local_participant_handle = 1;
  required DataTrackSchemaId schema_id = 2;
  // Identity of the participant who owns the schema.
  required string participant_identity = 3;
  optional uint64 request_async_id = 4;
}
message GetSchemaResponse {
  required uint64 async_id = 1;
}
message GetSchemaCallback {
  required uint64 async_id = 1;
  // The schema definition, present on success.
  optional string definition = 2;
  // Present if the schema could not be retrieved.
  optional string error = 3;
}
