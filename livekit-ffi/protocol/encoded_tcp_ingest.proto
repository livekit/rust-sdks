syntax = "proto2";

package livekit.proto;
option csharp_namespace = "LiveKit.Proto";

import "handle.proto";
import "track.proto";
import "video_frame.proto";

// High-level helper that ingests an encoded (compressed) video bytestream over TCP
// and publishes it to a LiveKit room. Wraps the Rust
// `livekit_encoded_video_ingest::EncodedTcpIngest` type.

message EncodedTcpIngestInfo {
  // Sid of the published track. Always set once the creation callback
  // fires with a success message.
  required string track_sid = 1;
  // Name of the published track.
  required string track_name = 2;
}

message OwnedEncodedTcpIngest {
  required FfiOwnedHandle handle = 1;
  required EncodedTcpIngestInfo info = 2;
}

// Create an `EncodedTcpIngest` and publish its track on the given room.
// The ingest runs until `StopEncodedTcpIngestRequest` is called.
message NewEncodedTcpIngestRequest {
  required uint64 room_handle = 1;
  required string host = 2;
  required uint32 port = 3;
  required VideoCodec codec = 4;
  required uint32 width = 5;
  required uint32 height = 6;
  optional string track_name = 7;
  optional TrackSource track_source = 8;
  // Forwarded to TrackPublishOptions.video_encoding.max_bitrate when set.
  optional uint64 max_bitrate_bps = 9;
  // Forwarded alongside `max_bitrate_bps`. Defaults to 30 fps.
  optional double max_framerate_fps = 10;
  // Backoff between reconnect attempts (ms). Default: 1000.
  optional uint32 reconnect_backoff_ms = 11;
  // When true, stopping the ingest unpublishes the track. Default: true.
  optional bool unpublish_on_stop = 12;
  optional uint64 request_async_id = 13;
}

message NewEncodedTcpIngestResponse {
  required uint64 async_id = 1;
}

message NewEncodedTcpIngestCallback {
  required uint64 async_id = 1;
  oneof message {
    string error = 2;
    OwnedEncodedTcpIngest ingest = 3;
  }
}

// Stop the ingest loop. If `unpublish_on_stop` was set (the default on
// creation), the track is unpublished as part of this call.
message StopEncodedTcpIngestRequest {
  required uint64 ingest_handle = 1;
  optional uint64 request_async_id = 2;
}

message StopEncodedTcpIngestResponse {
  required uint64 async_id = 1;
}

message StopEncodedTcpIngestCallback {
  required uint64 async_id = 1;
  optional string error = 2;
}

// Snapshot of cumulative stats since the ingest was created.
message EncodedTcpIngestStats {
  required uint64 frames_accepted = 1;
  required uint64 frames_dropped = 2;
  required uint64 keyframes = 3;
  required uint64 tcp_reconnects = 4;
}

message GetEncodedTcpIngestStatsRequest {
  required uint64 ingest_handle = 1;
}

message GetEncodedTcpIngestStatsResponse {
  required EncodedTcpIngestStats stats = 1;
}

// Ingest-level events dispatched as FfiEvents.
message EncodedTcpIngestEvent {
  required uint64 ingest_handle = 1;
  oneof message {
    Connected connected = 2;
    Disconnected disconnected = 3;
    KeyframeRequested keyframe_requested = 4;
    TargetBitrateChanged target_bitrate_changed = 5;
  }

  message Connected {
    // Peer socket address the TCP connection landed on, e.g. "127.0.0.1:5000".
    required string peer = 1;
  }

  message Disconnected {
    // Human-readable reason for the disconnect. The ingest loop will
    // reconnect automatically after the configured backoff unless the
    // ingest is being stopped.
    required string reason = 1;
  }

  message KeyframeRequested {}

  message TargetBitrateChanged {
    required uint32 bitrate_bps = 1;
    required double framerate_fps = 2;
  }
}
